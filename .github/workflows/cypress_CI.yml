name: CypressCI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests_cypressGUI:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        folder:
          - GlobalSQA
          - Inatel
          - SauceDemo

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./Cypress_Content/package-lock.json

      - name: Install dependencies
        working-directory: ./Cypress_Content
        run: npm ci

      - name: Execute tests - ${{ matrix.folder }}
        working-directory: ./Cypress_Content
        run: npx cypress run --spec "cypress/e2e/${{ matrix.folder }}/**"

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.folder }}
          path: ./Cypress_Content/cypress/screenshots
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-${{ matrix.folder }}
          path: ./Cypress_Content/cypress/videos
          if-no-files-found: ignore
