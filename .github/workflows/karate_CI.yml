name: KarateCI

on:
  push:
    branches: [ main ]
    paths:
      - 'KarateAPI_Content/**'
      - '.github/workflows/karate_CI.yml'

  pull_request:
    branches: [ main ]
    paths:
      - 'KarateAPI_Content/**'
      - '.github/workflows/karate_CI.yml'

jobs:

  run_KarateAPI_Tests: 

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
       java-version: '17'
       distribution: 'adopt'

    - name: Installing Maven
      run: |
       cd KarateAPI_Content
       mvn clean install

    - name: Running Tests   
      run: |
       cd KarateAPI_Content
       mvn test -Dtest=RunAllTests
    
    - name: Getting Artifacts
      uses: actions/upload-artifact@v4
      with:
       name: report_KarateAPI_Content
       path: ./KarateAPI_Content/target/karate-reports
